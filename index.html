<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Leilão PRO V.1</title>

<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:Arial; background:#0f172a; color:#fff; margin:0; }

.container { max-width:430px; margin:auto; padding:12px; }

h2 { text-align:center; }

.card { background:#1e293b; padding:12px; border-radius:14px; margin-bottom:12px; }

.linha { display:flex; align-items:center; gap:8px; margin:6px 0; position:relative; }
.linha label { width:95px; font-size:13px; }

input, select {
    flex:1;
    height:44px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:#fff;
    padding:8px;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:6px;
    font-weight:bold;
}

.add { background:#22c55e; }
.delete { background:red; }

.lista-autocomplete {
    position:absolute;
    top:100%;
    left:100px;
    right:0;
    background:#1e293b;
    border-radius:8px;
    max-height:150px;
    overflow:auto;
    z-index:10;
}

.lista-autocomplete div {
    padding:8px;
    cursor:pointer;
}
.lista-autocomplete div:hover { background:#22c55e; }

.resultado { margin-top:8px; font-size:13px; }

.ok { color:lightgreen; font-weight:bold; }
.ruim { color:red; font-weight:bold; }

.dashboard {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.box {
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    text-align:center;
}

.box strong {
    display:block;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>Leilão 🚗 V.1</h2>

<div class="dashboard">
    <div class="box">Veículos <strong id="total">0</strong></div>
    <div class="box">Lucro Total <strong id="lucroTotal">R$ 0</strong></div>
    <div class="box">🟢 Boas <strong id="boas">0</strong></div>
    <div class="box">🔴 Ruins <strong id="ruins">0</strong></div>
</div>

<button class="add" onclick="nova()">+ Novo Veículo</button>
<div id="lista"></div>

</div>

<script>

let marcas = [];

async function init(){
    let res = await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas");
    marcas = await res.json();
}

function moeda(v){
    return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function nova(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="linha"><label>Lote</label><input class="lote"></div>

<div class="linha">
<label>Marca</label>
<input class="marca" oninput="autoMarca(this)">
<div class="lista-autocomplete"></div>
</div>

<div class="linha">
<label>Modelo</label>
<input class="modelo" oninput="autoModelo(this)">
<div class="lista-autocomplete"></div>
</div>

<div class="linha">
<label>Ano</label>
<select class="ano" onchange="buscarFipe(this)"></select>
</div>

<div class="linha"><label>FIPE</label><input class="fipe" readonly></div>

<div class="linha"><label>% Venda</label><input class="perc" type="number" value="80" oninput="calc(this)"></div>
<div class="linha"><label>Comissão</label><input class="comissao" type="number" value="5" oninput="calc(this)"></div>

<div class="linha"><label>Tipo</label>
<select class="tipo" onchange="calc(this)">
<option value="1900">Carro</option>
<option value="500">Moto</option>
</select>
</div>

<div class="linha"><label>Despesas</label><input class="despesas" type="number" value="0" oninput="calc(this)"></div>
<div class="linha"><label>Lucro %</label><input class="lucroObj" type="number" value="15" oninput="calc(this)"></div>

<div class="resultado"></div>

<button onclick="remover(this)">Excluir</button>
`;

document.getElementById("lista").appendChild(div);
}

function autoMarca(input){
let lista=input.nextElementSibling;
lista.innerHTML="";
let termo=input.value.toLowerCase();

marcas.filter(m=>m.nome.toLowerCase().includes(termo)).slice(0,10)
.forEach(m=>{
let d=document.createElement("div");
d.innerText=m.nome;
d.onclick=()=>{
input.value=m.nome;
input.dataset.codigo=m.codigo;
lista.innerHTML="";
};
lista.appendChild(d);
});
}

async function autoModelo(input){
let card=input.closest(".card");
let marca=card.querySelector(".marca").dataset.codigo;
if(!marca) return;

let res=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marca}/modelos`);
let data=await res.json();

let lista=input.nextElementSibling;
lista.innerHTML="";
let termo=input.value.toLowerCase();

data.modelos.filter(m=>m.nome.toLowerCase().includes(termo)).slice(0,10)
.forEach(m=>{
let d=document.createElement("div");
d.innerText=m.nome;
d.onclick=()=>{
input.value=m.nome;
input.dataset.codigo=m.codigo;
lista.innerHTML="";
carregarAnos(card, marca, m.codigo);
};
lista.appendChild(d);
});
}

async function carregarAnos(card, marca, modelo){
let select=card.querySelector(".ano");

let res=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marca}/modelos/${modelo}/anos`);
let data=await res.json();

select.innerHTML="";
data.forEach(a=>{
select.innerHTML+=`<option value="${a.codigo}">${a.nome}</option>`;
});
}

async function buscarFipe(select){
let card=select.closest(".card");

let marca=card.querySelector(".marca").dataset.codigo;
let modelo=card.querySelector(".modelo").dataset.codigo;
let ano=select.value;

let res=await fetch(`https://parallelum.com.br/fipe/api/v1/carros/marcas/${marca}/modelos/${modelo}/anos/${ano}`);
let data=await res.json();

card.querySelector(".fipe").value=data.Valor.replace("R$ ","").replace(".","").replace(",",".");
calc(select);
}

function calc(el){
let c=el.closest(".card");

let fipe=Number(c.querySelector(".fipe").value);
let perc=Number(c.querySelector(".perc").value);
let comissao=Number(c.querySelector(".comissao").value);
let taxa=Number(c.querySelector(".tipo").value);
let despesas=Number(c.querySelector(".despesas").value);
let lucroObj=Number(c.querySelector(".lucroObj").value);

let venda=fipe*(perc/100);
let comissaoValor=venda*(comissao/100);
let lucroDesejado=venda*(lucroObj/100);

let compraMax=venda-comissaoValor-taxa-despesas-lucroDesejado;
let lucro=venda-(compraMax+comissaoValor+taxa+despesas);

let status=(compraMax>0 && lucro>=0)?"ok":"ruim";
let texto=status=="ok"?"🟢 COMPRA BOA":"🔴 NÃO COMPRAR";

c.querySelector(".resultado").innerHTML=`
Venda: ${moeda(venda)}<br>
Comprar até: <b>${moeda(compraMax)}</b><br>
Lucro: ${moeda(lucro)}<br>
<span class="${status}">${texto}</span>
`;

atualizarDash();
}

function atualizarDash(){
let total=0, boas=0, ruins=0, lucroTotal=0;

document.querySelectorAll(".card").forEach(c=>{
let txt=c.querySelector(".resultado").innerText;
if(!txt) return;

total++;

let match=txt.match(/Lucro: R\\$ ([\\d.,]+)/);
if(match){
let valor=Number(match[1].replace(".","").replace(",","."));
lucroTotal+=valor;
}

if(txt.includes("COMPRA BOA")) boas++;
else ruins++;
});

document.getElementById("total").innerText=total;
document.getElementById("boas").innerText=boas;
document.getElementById("ruins").innerText=ruins;
document.getElementById("lucroTotal").innerText=moeda(lucroTotal);
}

function remover(btn){
btn.closest(".card").remove();
atualizarDash();
}

init();
nova();

</script>

</body>
</html>
