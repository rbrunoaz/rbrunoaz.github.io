<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Leilão PRO V.1</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: Arial; background:#0f172a; color:#fff; margin:0; }

.container { max-width:430px; margin:auto; padding:12px; }

h2 { text-align:center; }

.card { background:#1e293b; padding:12px; border-radius:14px; margin-bottom:12px; }

.linha { display:flex; align-items:center; gap:8px; margin:6px 0; position:relative; }
.linha label { width:95px; font-size:13px; }

input, select {
    flex:1;
    height:44px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:#fff;
    padding:8px;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:6px;
    font-weight:bold;
}

.add { background:#22c55e; }
.delete { background:red; }

.lista-autocomplete {
    position:absolute;
    top:100%;
    left:100px;
    right:0;
    background:#1e293b;
    border-radius:8px;
    max-height:150px;
    overflow:auto;
}

.lista-autocomplete div {
    padding:8px;
    cursor:pointer;
}
.lista-autocomplete div:hover { background:#22c55e; }

.resultado { margin-top:8px; font-size:13px; }

.ok { color:lightgreen; font-weight:bold; }
.ruim { color:red; font-weight:bold; }

.dashboard {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.box {
    background:#1e293b;
    padding:10px;
    border-radius:12px;
    text-align:center;
    font-size:13px;
}

.box strong {
    display:block;
    font-size:18px;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="container">

<h2>Leilão 🚗 V.1</h2>

<div class="dashboard">
    <div class="box">Veículos <strong id="total">0</strong></div>
    <div class="box">Lucro Total <strong id="lucroTotal">R$ 0</strong></div>
    <div class="box">🟢 Boas <strong id="boas">0</strong></div>
    <div class="box">🔴 Ruins <strong id="ruins">0</strong></div>
</div>

<button class="add" onclick="nova()">+ Novo Veículo</button>

<div id="lista"></div>

</div>

<script>

let marcasCache = [];

function moeda(v){
    return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

async function carregarMarcas(){
    let res = await fetch("https://parallelum.com.br/fipe/api/v1/carros/marcas");
    marcasCache = await res.json();
}

function nova(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div class="linha"><label>Lote</label><input></div>

<div class="linha"><label>Marca</label>
<input oninput="filtrarMarca(this)">
<div class="lista-autocomplete"></div>
</div>

<div class="linha"><label>Modelo</label>
<input oninput="filtrarModelo(this)">
<div class="lista-autocomplete"></div>
</div>

<div class="linha"><label>Ano</label>
<select onchange="buscarFipe(this)"></select>
</div>

<div class="linha"><label>FIPE</label><input readonly></div>

<div class="linha"><label>% Venda</label><input type="number" value="80" oninput="calc(this)"></div>
<div class="linha"><label>Comissão</label><input type="number" value="5" oninput="calc(this)"></div>

<div class="linha"><label>Tipo</label>
<select onchange="calc(this)">
<option value="1900">Carro</option>
<option value="500">Moto</option>
</select>
</div>

<div class="linha"><label>Despesas</label><input type="number" value="0" oninput="calc(this)"></div>
<div class="linha"><label>Lucro %</label><input type="number" value="15" oninput="calc(this)"></div>

<div class="resultado"></div>

<button onclick="salvar()">Salvar</button>
<button class="delete" onclick="remover(this)">Excluir</button>
`;

document.getElementById("lista").appendChild(div);
}

function atualizarDash(){
let total=0, boas=0, ruins=0, lucroTotal=0;

document.querySelectorAll(".card").forEach(c=>{
let txt=c.querySelector(".resultado").innerText;
if(!txt) return;

total++;

let lucro = Number(txt.split("Lucro: R$ ")[1]?.split("\n")[0].replace(".","").replace(",",".")||0);

if(txt.includes("COMPRA BOA")){
boas++; lucroTotal+=lucro;
}else{
ruins++;
}
});

document.getElementById("total").innerText=total;
document.getElementById("boas").innerText=boas;
document.getElementById("ruins").innerText=ruins;
document.getElementById("lucroTotal").innerText=moeda(lucroTotal);
}

function calc(el){
let c=el.parentElement.parentElement;

let fipe=Number(c.children[4].children[1].value);
let perc=Number(c.children[5].children[1].value);
let comissao=Number(c.children[6].children[1].value);
let taxa=Number(c.children[7].children[1].value);
let despesas=Number(c.children[8].children[1].value);
let lucroObj=Number(c.children[9].children[1].value);

let venda=fipe*(perc/100);
let comissaoValor=venda*(comissao/100);
let lucroDesejado=venda*(lucroObj/100);

let compraMax=venda-comissaoValor-taxa-despesas-lucroDesejado;
let lucro=venda-(compraMax+comissaoValor+taxa+despesas);

let status=(compraMax>0 && lucro>=0)?"ok":"ruim";
let texto=status=="ok"?"🟢 COMPRA BOA":"🔴 NÃO COMPRAR";

c.querySelector(".resultado").innerHTML=`
Venda: ${moeda(venda)}<br>
Comprar até: <b>${moeda(compraMax)}</b><br>
Lucro: ${moeda(lucro)}<br>
<span class="${status}">${texto}</span>
`;

atualizarDash();
}

function remover(btn){
btn.parentElement.remove();
atualizarDash();
}

carregarMarcas();
nova();

</script>

</body>
</html>
